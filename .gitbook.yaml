# GitBook Configuration
# https://docs.gitbook.com/

root: ./docs
title: Gnothi Documentation
description: AI-Oracle Powered Prediction Markets on GenLayer

structure:
  readme: README.md
  summary: SUMMARY.md

plugins:
  - search
  - lunr
  - highlight
  - fontsettings
  - theme-default

pluginsConfig:
  fontsettings:
    theme: white
    family: sans
    size: 2

links:
  sidebar:
    GitHub: https://github.com/enliven17/gnothi
    App: https://app.gnothi.xyz
    Discord: https://discord.gg/gnothi
